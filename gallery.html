<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

nav{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #222;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
}

h1{
  text-align:center;
}

.menu,.submenu{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:20px;
}

button{
  background:#161616;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.section{display:none;}
.section.active{display:block;}

.subsection{display:none;}
.subsection.active{display:block;}

.grid{
  max-width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.photo img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#lightbox img{
  max-width:100%;
  max-height:100%;
}
</style>
</head>

<body>

<nav>
  <a href="#">Home</a>
  <a href="#">Gallery</a>
</nav>

<h1>Gallery</h1>

<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('ethiopia')">Ethiopia</button>
</div>

<!-- NAMIBIA -->
<div id="namibia" class="section active">
  <div class="grid">
    <div class="photo">
      <img src="Brukkaros.jpg" onclick="openLightbox(this.src)">
    </div>
    <div class="photo">
      <img src="Kolmanskop.jpg" onclick="openLightbox(this.src)">
    </div>
  </div>
</div>

<!-- KENYA -->
<div id="kenya" class="section">
  <div class="grid">
    <div class="photo">
      <img src="Kenya1.jpg" onclick="openLightbox(this.src)">
    </div>
    <div class="photo">
      <img src="Kenya2.jpg" onclick="openLightbox(this.src)">
    </div>
  </div>
</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section">

  <div class="submenu">
    <button onclick="showSub('volcanoes')">Volcanoes</button>
    <button onclick="showSub('landscape')">Landscape</button>
    <button onclick="showSub('wildlife')">Wildlife</button>
  </div>

  <div id="volcanoes" class="subsection active">
    <div class="grid">
      <div class="photo">
        <img src="Bishoftu.jpg" onclick="openLightbox(this.src)">
      </div>
      <div class="photo">
        <img src="Bode-Ameda.jpg" onclick="openLightbox(this.src)">
      </div>
    </div>
  </div>

  <div id="landscape" class="subsection">
    <div class="grid">
      <div class="photo">
        <img src="Tido.jpg" onclick="openLightbox(this.src)">
      </div>
    </div>
  </div>

  <div id="wildlife" class="subsection">
    <div class="grid">
      <div class="photo">
        <img src="stork.jpg" onclick="openLightbox(this.src)">
      </div>
      <div class="photo">
        <img src="flamingos.jpg" onclick="openLightbox(this.src)">
      </div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // reset subcategory always
  document.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));
  let first = document.querySelector('#'+id+' .subsection');
  if(first) first.classList.add('active');
}

function showSub(id){
  document.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
