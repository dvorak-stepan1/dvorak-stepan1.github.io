<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

h1{text-align:center;}

.menu, .submenu{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin:20px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

.subsection{display:none;}
.subsection.active{display:block;}

/* IMPORTANT: NO GRID HEIGHT CONTROL, NO CROPPING */
.grid{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* FIX: each image keeps ORIGINAL ratio */
.photo img{
  width:100%;
  height:auto;
  display:block;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

#lightbox img{
  max-width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<h1>Gallery</h1>

<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('ethiopia')">Ethiopia</button>
</div>

<!-- NAMIBIA -->
<div id="namibia" class="section active">
  <div class="grid">
    <img src="Brukkaros.jpg" onclick="openLightbox(this.src)">
    <img src="Kolmanskop.jpg" onclick="openLightbox(this.src)">
  </div>
</div>

<!-- KENYA -->
<div id="kenya" class="section">
  <div class="grid">
    <img src="Kenya1.jpg" onclick="openLightbox(this.src)">
    <img src="Kenya2.jpg" onclick="openLightbox(this.src)">
  </div>
</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section">

  <div class="submenu">
    <button onclick="showSub('volcanoes')">Volcanoes</button>
    <button onclick="showSub('landscape')">Landscape</button>
    <button onclick="showSub('wildlife')">Wildlife</button>
  </div>

  <div id="volcanoes" class="subsection active">
    <div class="grid">
      <img src="Bishoftu.jpg" onclick="openLightbox(this.src)">
      <img src="Bode-Ameda.jpg" onclick="openLightbox(this.src)">
    </div>
  </div>

  <div id="landscape" class="subsection">
    <div class="grid">
      <img src="Tido.jpg" onclick="openLightbox(this.src)">
    </div>
  </div>

  <div id="wildlife" class="subsection">
    <div class="grid">
      <img src="stork.jpg" onclick="openLightbox(this.src)">
      <img src="flamingos.jpg" onclick="openLightbox(this.src)">
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));

  document.getElementById(id).classList.add('active');

  let first = document.getElementById(id).querySelector('.subsection');
  if(first) first.classList.add('active');
}

function showSub(id){
  let parent = document.getElementById("ethiopia");
  parent.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));
  parent.querySelector('#' + id).classList.add('active');
}

function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
