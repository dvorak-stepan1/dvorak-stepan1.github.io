<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  text-align:center;
}

/* NAV */
nav{
  padding:20px;
  border-bottom:1px solid #222;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  opacity:0.7;
}

nav a:hover{opacity:1;}

h1{margin-top:30px;}

/* BUTTONS */
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:30px;
}

button{
  background:#161616;
  color:white;
  border:none;
  padding:15px 20px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{background:#2a2a2a;}

/* LEVELS */
.section{display:none;}
.section.active{display:block;}

.submenu{margin:20px;}

.grid{
  max-width:1000px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.photo img{
  width:100%;
  border-radius:10px;
}

.photo p{
  opacity:0.7;
  font-size:14px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
</nav>

<h1>Gallery</h1>

<!-- LEVEL 1: COUNTRIES -->
<div class="menu">
  <button onclick="show('ethiopia')">Ethiopia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('namibia')">Namibia</button>
</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section active">

  <h2>Ethiopia</h2>

  <!-- LEVEL 2 -->
  <div class="submenu">
    <button onclick="showSub('ethiopia-volcano')">Volcanoes</button>
    <button onclick="showSub('ethiopia-wildlife')">Wildlife</button>
  </div>

  <!-- VOLCANOES -->
  <div id="ethiopia-volcano" class="subsection active">
    <div class="grid">

      <div class="photo">
        <img src="Tido.jpg">
        <p>Volcano 1</p>
      </div>

      <div class="photo">
        <img src="Tido.jpg">
        <p>Volcano 2</p>
      </div>

    </div>
  </div>

  <!-- WILDLIFE -->
  <div id="ethiopia-wildlife" class="subsection">
    <div class="grid">

      <div class="photo">
        <img src="Tido.jpg">
        <p>Wildlife 1</p>
      </div>

      <div class="photo">
        <img src="Tido.jpg">
        <p>Wildlife 2</p>
      </div>

    </div>
  </div>

</div>

<!-- KENYA -->
<div id="kenya" class="section">

  <h2>Kenya</h2>
  <div class="grid">
    <div class="photo">
      <img src="Kenya1.jpg">
      <p>Kenya Scene</p>
    </div>
  </div>

</div>

<!-- NAMIBIA -->
<div id="namibia" class="section">

  <h2>Namibia</h2>
  <div class="grid">
    <div class="photo">
      <img src="Brukkaros.jpg">
      <p>Namibia Scene</p>
    </div>
  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');

  // reset sub
  document.querySelectorAll('.subsection').forEach(s=>{
    s.classList.remove('active');
  });
}

function showSub(id){
  document.querySelectorAll('.subsection').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
