<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Zoom Modal</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
    background: #f4f4f4;
  }

  /* Thumbnail image */
  .thumb {
    width: 250px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
  }

  .thumb:hover {
    transform: scale(1.05);
  }

  /* Modal background */
  .modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
  }

  /* Enlarged image */
  .modal img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
  }

  /* Close button */
  .close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>

<body>

<h2>Click the image to enlarge</h2>

<!-- Thumbnail -->
<img src="https://picsum.photos/600/400" class="thumb" id="myImg">

<!-- Modal -->
<div class="modal" id="modal">
  <span class="close" id="closeBtn">&times;</span>
  <img id="modalImg">
</div>

<script>
  const img = document.getElementById("myImg");
  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");
  const closeBtn = document.getElementById("closeBtn");

  // Open modal
  img.onclick = function () {
    modal.style.display = "flex";
    modalImg.src = this.src;
  }

  // Close modal
  closeBtn.onclick = function () {
    modal.style.display = "none";
  }

  // Close when clicking outside image
  modal.onclick = function (e) {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
