<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
}

/* GRID */
.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
  padding:20px;
}

/* 🔥 ŽÁDNÉ OŘEZÁNÍ */
.photo img{
  width:100%;
  height:auto;         /* zachová originální poměr */
  border-radius:12px;
  cursor:pointer;
  display:block;
  transition:0.2s;
}

.photo img:hover{
  transform:scale(1.02);
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 🔥 ORIGINÁLNÍ KVALITA ALE ROZUMNÁ VELIKOST */
#lightbox img{
  max-width:95vw;
  max-height:95vh;
  width:auto;
  height:auto;
  object-fit:contain;
  border-radius:10px;
}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
}

button{
  padding:10px 15px;
  background:#161616;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.section{display:none;}
.section.active{display:block;}
</style>
</head>

<body>

<h1 style="text-align:center;">Gallery</h1>

<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
</div>

<div id="namibia" class="section active">
  <div class="grid">
    <div class="photo"><img src="Brukkaros.jpg" onclick="openLightbox(this.src)"></div>
    <div class="photo"><img src="Kolmanskop.jpg" onclick="openLightbox(this.src)"></div>
    <div class="photo"><img src="Kolmanskop (2).jpg" onclick="openLightbox(this.src)"></div>

  </div>
</div>

<div id="kenya" class="section">
  <div class="grid">
    <div class="photo"><img src="Kenya1.jpg" onclick="openLightbox(this.src)"></div>
    <div class="photo"><img src="Kenya2.jpg" onclick="openLightbox(this.src)"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
