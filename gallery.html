<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
  text-align:center;
}

/* NAV */
nav{
  padding:20px;
  border-bottom:1px solid #222;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  opacity:0.7;
}

nav a:hover{
  opacity:1;
}

/* TITLE */
h1{
  margin-top:30px;
}

/* BUTTON MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:40px 20px;
}

.menu button{
  background:#161616;
  color:white;
  border:none;
  padding:18px 28px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.25s;
}

.menu button:hover{
  background:#2a2a2a;
  transform:scale(1.05);
}

/* SECTIONS */
.section{
  display:none;
  padding:30px 20px;
}

.section.active{
  display:block;
}

/* PHOTO GRID */
.photo{
  width:45%;
  display:inline-block;
  vertical-align:top;
  margin:10px;
}

.photo img{
  width:100%;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.photo p{
  margin-top:8px;
  opacity:0.7;
  font-size:14px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="index.html">Home</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="gallery.html">Gallery</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<h1>Gallery</h1>

<!-- MENU BUTTONS -->
<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('ethiopia')">Ethiopia</button>
</div>

<!-- NAMIBIA -->
<div id="namibia" class="section active">

  <h2>Namibia</h2>

  <div class="photo">
    <img src="Brukkaros.jpg">
    <p>Brukkaros Volcano</p>
  </div>

  <div class="photo">
    <img src="Kolmanskop.jpg">
    <p>Kolmanskop Desert Town</p>
  </div>

  <div class="photo">
    <img src="Kolmanskop (1).jpg">
    <p>Sand Houses</p>
  </div>

  <div class="photo">
    <img src="Kolmanskop (2).jpg">
    <p>Abandoned Interior</p>
  </div>

</div>

<!-- KENYA -->
<div id="kenya" class="section">

  <h2>Kenya</h2>

  <div class="photo">
    <img src="Kenya1.jpg">
    <p>Kenya Landscape</p>
  </div>

</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section">

  <h2>Ethiopia</h2>

  <div class="photo">
    <img src="Tido.jpg">
    <p>Ethiopia Scene</p>
  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(el => {
    el.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
