<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  padding:20px;
  border-bottom:1px solid #222;
  text-align:center;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  opacity:0.7;
}

nav a:hover{opacity:1;}

h1{
  text-align:center;
  margin-top:30px;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:40px 20px;
}

.menu button{
  background:#161616;
  color:white;
  border:none;
  padding:15px 25px;
  border-radius:10px;
  cursor:pointer;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* GRID */
.grid{
  max-width:1000px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
  padding:20px;
}

.photo img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.photo img:hover{
  transform:scale(1.02);
}

.photo p{
  text-align:center;
  opacity:0.7;
  font-size:14px;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#lightbox img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="gallery.html">Gallery</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<h1>Gallery</h1>

<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('ethiopia')">Ethiopia</button>
</div>

<!-- NAMIBIA -->
<div id="namibia" class="section active">
  <div class="grid">

    <div class="photo">
      <img src="Brukkaros.jpg" onclick="openLightbox(this.src)">
      <p>Brukkaros Volcano</p>
    </div>

    <div class="photo">
      <img src="Kolmanskop.jpg" onclick="openLightbox(this.src)">
      <p>Kolmanskop</p>
    </div>

    <div class="photo">
      <img src="Kolmanskop (1).jpg" onclick="openLightbox(this.src)">
      <p>Desert Houses</p>
    </div>

    <div class="photo">
      <img src="Kolmanskop (2).jpg" onclick="openLightbox(this.src)">
      <p>Sand Interior</p>
    </div>

  </div>
</div>

<!-- KENYA -->
<div id="kenya" class="section">
  <div class="grid">

    <div class="photo">
      <img src="Kenya1.jpg" onclick="openLightbox(this.src)">
      <p>Kenya Landscape</p>
    </div>

    <div class="photo">
      <img src="Kenya2.jpg" onclick="openLightbox(this.src)">
      <p>Kenya Wildlife</p>
    </div>

  </div>
</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section">
  <div class="grid">

    <div class="photo">
      <img src="Tido.jpg" onclick="openLightbox(this.src)">
      <p>Ethiopia Scene</p>
    </div>
       <p>Volcanoes</p>
       <img src="Bishoftu.jpg" onclick="openLightbox(this.src)">
      <img src="Bode-Ameda.jpg" onclick="openLightbox(this.src)">
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* OPEN */
function openLightbox(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = src;
}

/* CLOSE */
function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
