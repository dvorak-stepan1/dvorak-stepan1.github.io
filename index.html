<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Štěpán Dvořák photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>Budamada</h1>
  <p>Portfolio</p>
</header>

<div class="gallery">
 <img src="Budamada maar">
</div>

<footer>
  © 2026 Štěpán Dvořák. All rights reserved.
</footer>

</body>
</html>
