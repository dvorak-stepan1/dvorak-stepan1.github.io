<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Štěpán Dvořák Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    nav {
      text-align: center;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.7;
    }

    nav a:hover {
      opacity: 1;
    }

    section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>Štěpán Dvořák Photography</h1>
  <p>Photo Portfolio</p>
</header>

<nav>
  <a href="#portfolio">Portfolio</a>
  <a href="#about">About</a>
   <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<section id="portfolio">
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="Budamada maar.jpg" alt="Photo">
  </div>
</section>

<section id="about">
  <h2>About</h2>
  <p>Geologist with camera in his hands.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: dvorakste@natur.cuni.cz</p>
</section>

<footer>
  © 2026 Štěpán Dvořák Photography. All rights reserved.
</footer>

</body>
</html>
