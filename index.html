<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  padding:20px;
  border-bottom:1px solid #222;
  text-align:center;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  opacity:0.7;
}

nav a:hover{opacity:1;}

h1{
  text-align:center;
  margin-top:30px;
}

/* MENU */
.menu, .submenu{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:20px;
}

button{
  background:#161616;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#2a2a2a;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

.subsection{display:none;}
.subsection.active{display:block;}

/* GRID */
.grid{
  max-width:1100px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
  padding:20px;
}

/* THUMBNAILS */
.photo img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.photo img:hover{
  transform:scale(1.03);
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 👉 ORIGINÁL KVALITA (bez omezení velikosti) */
#lightbox img{
  width:auto;
  height:auto;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="gallery.html">Gallery</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<h1>Gallery</h1>

<div class="menu">
  <button onclick="show('namibia')">Namibia</button>
  <button onclick="show('kenya')">Kenya</button>
  <button onclick="show('ethiopia')">Ethiopia</button>
</div>

<!-- NAMIBIA -->
<div id="namibia" class="section active">
  <div class="grid">

    <div class="photo">
      <img src="Brukkaros.jpg" onclick="openLightbox('Brukkaros.jpg')">
    </div>

    <div class="photo">
      <img src="Kolmanskop.jpg" onclick="openLightbox('Kolmanskop.jpg')">
    </div>

  </div>
</div>

<!-- KENYA -->
<div id="kenya" class="section">
  <div class="grid">

    <div class="photo">
      <img src="Kenya1.jpg" onclick="openLightbox('Kenya1.jpg')">
    </div>

    <div class="photo">
      <img src="Kenya2.jpg" onclick="openLightbox('Kenya2.jpg')">
    </div>

  </div>
</div>

<!-- ETHIOPIA -->
<div id="ethiopia" class="section">

  <div class="submenu">
    <button onclick="showSub('volcanoes')">Volcanoes</button>
    <button onclick="showSub('landscape')">Landscape</button>
    <button onclick="showSub('wildlife')">Wildlife</button>
  </div>

  <!-- VOLCANOES -->
  <div id="volcanoes" class="subsection active">
    <div class="grid">

      <div class="photo">
        <img src="Bishoftu.jpg" onclick="openLightbox('Bishoftu.jpg')">
      </div>

      <div class="photo">
        <img src="Bode-Ameda.jpg" onclick="openLightbox('Bode-Ameda.jpg')">
      </div>

    </div>
  </div>

  <!-- LANDSCAPE -->
  <div id="landscape" class="subsection">
    <div class="grid">

      <div class="photo">
        <img src="Tido.jpg" onclick="openLightbox('Tido.jpg')">
      </div>

    </div>
  </div>

  <!-- WILDLIFE -->
  <div id="wildlife" class="subsection">
    <div class="grid">

      <div class="photo">
        <img src="Tido.jpg" onclick="openLightbox('Tido.jpg')">
      </div>

    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function showSub(id){
  document.querySelectorAll('.subsection').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
