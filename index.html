<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Štěpán Dvořák Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 80px 20px 40px;
    }

    header h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 1px;
    }

    header p {
      opacity: 0.7;
      margin-top: 10px;
    }

    nav {
      position: sticky;
      top: 0;
      background: #0f0f0f;
      padding: 15px;
      border-bottom: 1px solid #222;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      opacity: 0.7;
      font-size: 14px;
    }

    nav a:hover {
      opacity: 1;
    }

    section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    p {
      max-width: 600px;
      margin: auto;
      opacity: 0.8;
      line-height: 1.6;
    }

    footer {
      padding: 40px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<header>
  <h1>Štěpán Dvořák Photography</h1>
  <p>Landscape & Documentary Photography</p>
</header>

<nav>
  <a href="#portfolio">Portfolio</a>
  <a href="#gallery">Gallery</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<section id="portfolio">
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="budamada.jpg">
  </div>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="budamada.jpg">
  </div>
</section>

<section id="about">
  <h2>About</h2>
  <p>
    Geologist and photographer focused on capturing landscapes, light, and atmosphere.
  </p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: dvorakste@natur.cuni.cz</p>
</section>

<footer>
  © 2026 Štěpán Dvořák Photography
</footer>

</body>
</html>
